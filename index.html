<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farris Hub - 1000+ Arcade Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100%;
            height: 100vh;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.7);
            border: 3px solid #00ffff;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
        }

        h1 {
            font-size: 3em;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .subtitle {
            color: #ff00ff;
            font-size: 1.3em;
            letter-spacing: 1px;
        }

        .controls {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ff00ff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            color: #00ffff;
            border-radius: 5px;
            font-size: 1em;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .search-box input::placeholder {
            color: rgba(0, 255, 255, 0.5);
        }

        .search-box input:focus {
            outline: none;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
            border-color: #ff00ff;
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            border: 2px solid #00ffff;
            color: #000;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            white-space: nowrap;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.8);
            border-color: #ff00ff;
        }

        .controls-buttons {
            display: flex;
            gap: 10px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .game-card {
            background: rgba(0, 20, 40, 0.9);
            border: 2px solid #00ffff;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.8);
            background: rgba(0, 50, 100, 0.95);
        }

        .game-emoji {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .game-name {
            font-weight: bold;
            color: #00ffff;
            margin-bottom: 5px;
            font-size: 0.95em;
        }

        .game-year {
            font-size: 0.75em;
            color: rgba(0, 255, 255, 0.6);
            margin-bottom: 3px;
        }

        .game-genre {
            font-size: 0.75em;
            color: #ff00ff;
        }

        .info-bar {
            text-align: center;
            color: #00ffff;
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        .info-bar strong {
            color: #ff00ff;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                width: 100%;
            }

            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="starField"></canvas>
    
    <div class="container">
        <header>
            <h1>🎮 FARRIS HUB 🎮</h1>
            <p class="subtitle">1000+ Arcade Games Database</p>
        </header>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search games by name...">
            </div>
            <div class="controls-buttons">
                <button onclick="quickSearch()">🔍 Search</button>
                <button onclick="showAll()">📺 Show All</button>
                <button onclick="goToAdvanced()">⚙️ Advanced Search</button>
            </div>
        </div>

        <div class="info-bar">
            Total Games: <strong id="totalCount">0</strong> | Displaying: <strong id="displayCount">0</strong>
        </div>

        <div class="games-grid" id="gamesGrid"></div>
    </div>

    <script>
        const canvas = document.getElementById('starField');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let stars = [];
        const starCount = 300;

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.z = Math.random() * canvas.width;
                this.size = Math.random() * 1.5;
            }

            update() {
                this.z -= 5;
                if (this.z <= 0) {
                    this.z = canvas.width;
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                }
            }

            draw() {
                const perspective = canvas.width / (2 * this.z);
                const x = (this.x - canvas.width / 2) * perspective + canvas.width / 2;
                const y = (this.y - canvas.height / 2) * perspective + canvas.height / 2;
                const size = this.size * perspective;

                ctx.fillStyle = `rgba(0, 255, 255, ${1 - this.z / canvas.width})`;
                ctx.fillRect(x, y, size, size);
            }
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < starCount; i++) {
                stars.push(new Star());
            }
        }

        function animateStars() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stars.forEach(star => {
                star.update();
                star.draw();
            });

            requestAnimationFrame(animateStars);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        initStars();
        animateStars();

            { name: 'Commando', year: 1985, genre: 'Shooter', emoji: '🪖' },
        ];

        for (let i = 0; i < 920; i++) {
            const genres = ['Shooter', 'Platformer', 'Racing', 'Fighting', 'Puzzle', 'Arcade', 'Action'];
            const emojis = ['🎮', '🎯', '🎪', '🎨', '🎭', '🎲', '🎳', '🛸', '🚀', '⚡', '💫', '🌌', '🔥', '💥', '⭐'];
            const years = [1980, 1985, 1990, 1995, 2000, 2005, 2010, 2015, 2020];

            arcadeGames.push({
                name: `Arcade Game ${i + 1}`,
                year: years[Math.floor(Math.random() * years.length)],
                genre: genres[Math.floor(Math.random() * genres.length)],
                emoji: emojis[Math.floor(Math.random() * emojis.length)]
            });
        }

        function displayGames(games) {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div class="game-emoji">${game.emoji}</div>
                    <div class="game-name">${game.name}</div>
                    <div class="game-year">📅 ${game.year}</div>
                    <div class="game-genre">${game.genre}</div>
                `;
                grid.appendChild(card);
            });

            document.getElementById('totalCount').textContent = arcadeGames.length;
            document.getElementById('displayCount').textContent = games.length;
        }

        function quickSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            if (!query) {
                alert('Please enter a game name!');
                return;
            }

            const results = arcadeGames.filter(game => 
                game.name.toLowerCase().includes(query)
            );

            displayGames(results);
        }

        function showAll() {
            document.getElementById('searchInput').value = '';
            displayGames(arcadeGames);
        }

        function goToAdvanced() {
            window.location.href = 'search.html';
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') quickSearch();
        });

        window.addEventListener('load', () => {
            displayGames(arcadeGames);
        });
    </script>
</body>
</html>
